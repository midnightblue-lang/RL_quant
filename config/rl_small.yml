algorithm: ppo
seed: 2026
gamma: 1.0
clip_epsilon: 0.2
learning_rate: 0.0003
ppo_epochs: 4
value_coef: 0.5
entropy_coef: 0.01
lstm_layers: 2
lstm_hidden_size: 128
dropout: 0.1
head_hidden_size: 64
pool_size: 30
invalid_reward: -1.0
device: cuda
train_iterations: 12
episodes_per_iteration: 8
data:
  daily_panel: data/interim/daily_panel.parquet
  labels: data/processed/labels.parquet
  train_start: "2018-01-01"
  train_end: "2020-12-31"
  validation_start: "2021-01-01"
  validation_end: "2021-03-31"
outputs:
  pool: data/features/rl_small/rl_alpha_pool.parquet
  metrics: data/reports/rl_small/rl_training_metrics.parquet
  validation: data/reports/rl_small/rl_validation_metrics.parquet
  config: data/reports/rl_small/rl_training_config.yml
  report: data/reports/rl_small/rl_factor_report.html
  pool_ic_live_report: data/reports/rl_small/rl_pool_ic_live.html
